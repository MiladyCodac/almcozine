<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Magazine AR Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <script>
    AFRAME.registerComponent("billboard-camera", {
      tick: function () {
        const camera = document.querySelector("[camera]");
        if (camera) {
          this.el.object3D.lookAt(camera.object3D.position);
        }
      }
    });

    window.addEventListener("click", () => {
      const vid = document.querySelector("#magVideo");
      if (vid) {
        vid.play().catch(() => {});
      }
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    .hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="hint">Allow camera access. If video does not start, tap the screen once.</div>

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <video
        id="magVideo"
        src="promo-video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-nft
      type="nft"
      url="targets/magazine-page"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="1.2"
        height="0.675"
        material="shader: flat; src: #magVideo; transparent: true;"
        billboard-camera
      ></a-plane>
    </a-nft>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const vid = document.querySelector("#magVideo");
    const marker = document.querySelector("a-nft");

    marker.addEventListener("markerFound", () => {
      vid.play().catch(() => {});
    });

    marker.addEventListener("markerLost", () => {
      vid.pause();
    });
  </script>
</body>
</html>
